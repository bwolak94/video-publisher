global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "core-backend"
    static_configs:
      - targets: ["core-backend:3001"]
    metrics_path: /metrics

  - job_name: "ai-backend"
    static_configs:
      - targets: ["ai-backend:8000"]
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
