name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ── NestJS core-backend ────────────────────────────────────────────────────
  core-backend:
    name: core-backend (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: core-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    name: frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  # ── Python ai-backend ───────────────────────────────────────────────────────
  ai-backend:
    name: ai-backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app --ignore-missing-imports

      - name: Test (pytest)
        run: uv run pytest tests/ -x -q
